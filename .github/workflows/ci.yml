name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --all

  lint:
    name: Lint (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy -- -D warnings

  swift-test:
    name: Test (Swift)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Swift package
        run: swift build --package-path mac-ui
      - name: Run Swift tests
        run: swift test --package-path mac-ui

  package:
    name: Package macOS DMG
    runs-on: macos-latest
    # Only produce artefacts on pushes to main, not on pull requests.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test, lint, swift-test]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build Rust release binary
        run: cargo build --release
      - name: Create DMG
        run: |
          mkdir -p dmg-staging
          cp target/release/voltai dmg-staging/voltai
          hdiutil create \
            -volname "VoltAI" \
            -srcfolder dmg-staging \
            -ov \
            -format UDZO \
            voltai-macos.dmg
      - name: Upload DMG artefact
        uses: actions/upload-artifact@v4
        with:
          name: voltai-macos-dmg
          path: voltai-macos.dmg
          retention-days: 30

  coverage:
    name: Coverage
    runs-on: macos-latest
    # Run on every push (not PRs) to track coverage trends over time.
    if: github.event_name == 'push'
    needs: [test, lint, swift-test]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin
      - name: Rust coverage (tarpaulin)
        run: cargo tarpaulin --out Xml --output-dir coverage/ --timeout 300 --fail-under 90
      - name: Upload Rust coverage report
        uses: actions/upload-artifact@v4
        with:
          name: rust-coverage
          path: coverage/cobertura.xml
          retention-days: 14
      - name: Swift coverage
        run: swift test --package-path mac-ui --enable-code-coverage
      - name: Collect Swift coverage report
        run: |
          PROF=$(find mac-ui/.build -name "*.profdata" | head -1)
          BIN=$(find mac-ui/.build -name "VoltAIPackageTests.xctest" | head -1)/Contents/MacOS/VoltAIPackageTests
          mkdir -p coverage
          xcrun llvm-cov export "$BIN" --instr-profile="$PROF" --format=lcov \
            > coverage/swift-coverage.lcov
          # Enforce 85% line coverage threshold
          xcrun llvm-cov report "$BIN" --instr-profile="$PROF" \
            | tee /tmp/swift-cov-report.txt
          python3 - <<'EOF'
          import sys, re
          text = open("/tmp/swift-cov-report.txt").read()
          total = [l for l in text.splitlines() if l.startswith("TOTAL")]
          if not total:
              print("Could not parse coverage report"); sys.exit(1)
          m = re.search(r'(\d+\.\d+)%', total[-1])
          cov = float(m.group(1)) if m else 0.0
          print(f"Swift line coverage: {cov:.1f}%")
          sys.exit(0 if cov >= 85.0 else 1)
          EOF
      - name: Upload Swift coverage report
        uses: actions/upload-artifact@v4
        with:
          name: swift-coverage
          path: coverage/swift-coverage.lcov
          retention-days: 14
